<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My GitHub Pages Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 28px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 680px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
        }
        p {
            color: #555;
        }
        .game {
            margin-top: 20px;
        }
        #gameCanvas {
            border: 1px solid #d1d9e6;
            background: #f8fbff;
            border-radius: 4px;
            cursor: crosshair;
            max-width: 100%;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .rule-note {
            margin-top: 10px;
            font-size: 0.86rem;
            color: #64748b;
        }
        button {
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #334155;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover {
            background: #f1f5f9;
        }
        footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Site Under Construction</h1>
        <p>This GitHub Pages site is coming soon.</p>
        <p>Try a 16-channel cellular automata mini-game while you wait.</p>

        <section class="game" aria-label="Multi-channel cellular automata">
            <canvas id="gameCanvas" width="480" height="320"></canvas>
            <div class="controls">
                <button id="toggleBtn" type="button">Start</button>
                <button id="stepBtn" type="button">Step</button>
                <button id="randomBtn" type="button">Randomize Cells</button>
                <button id="ruleBtn" type="button">Randomize Rule</button>
                <button id="clearBtn" type="button">Clear</button>
            </div>
            <div id="ruleNote" class="rule-note">Rule: smooth activator-diffuser (default)</div>
        </section>

        <footer>
            Hosted with <a href="https://pages.github.com/">GitHub Pages</a>
        </footer>
    </div>

    <script>
        const CHANNELS = 16;
        const cellSize = 16;
        const dt = 0.18;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const stepBtn = document.getElementById('stepBtn');
        const randomBtn = document.getElementById('randomBtn');
        const ruleBtn = document.getElementById('ruleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const ruleNote = document.getElementById('ruleNote');

        const cols = Math.floor(canvas.width / cellSize);
        const rows = Math.floor(canvas.height / cellSize);

        let running = false;
        let timer = null;
        let grid = createGrid(false);

        let rule = createDefaultRule();

        function createCell(randomize = false) {
            const cell = new Array(CHANNELS).fill(0);
            if (randomize) {
                for (let c = 0; c < CHANNELS; c++) {
                    cell[c] = Math.random();
                }
            }
            return cell;
        }

        function createGrid(randomize = false) {
            return Array.from({ length: rows }, () =>
                Array.from({ length: cols }, () => createCell(randomize))
            );
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function createDefaultRule() {
            return {
                self: Array.from({ length: CHANNELS }, (_, c) => 0.08 - c * 0.002),
                neighbor: Array.from({ length: CHANNELS }, (_, c) => 0.62 - c * 0.015),
                bias: Array.from({ length: CHANNELS }, (_, c) => (c === 0 ? -0.015 : -0.005)),
                driveFromViz: Array.from({ length: CHANNELS }, (_, c) => (c === 0 ? 0.0 : 0.18 - c * 0.008)),
                vizFeedback: Array.from({ length: CHANNELS }, (_, c) => (c === 0 ? 0.0 : 0.05 - c * 0.002))
            };
        }

        function randomizeRule() {
            rule = {
                self: Array.from({ length: CHANNELS }, () => (Math.random() - 0.5) * 0.35),
                neighbor: Array.from({ length: CHANNELS }, () => 0.15 + Math.random() * 0.9),
                bias: Array.from({ length: CHANNELS }, () => (Math.random() - 0.5) * 0.06),
                driveFromViz: Array.from({ length: CHANNELS }, () => (Math.random() - 0.3) * 0.4),
                vizFeedback: Array.from({ length: CHANNELS }, () => (Math.random() - 0.5) * 0.25)
            };
            ruleNote.textContent = `Rule: randomized (${Math.floor(Math.random() * 100000)})`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const value = clamp01(grid[y][x][0]);
                    const hue = 210 + value * 60;
                    const lightness = 14 + value * 72;
                    ctx.fillStyle = `hsl(${hue}, 80%, ${lightness}%)`;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
                }
            }
        }

        function computeNeighborhoodAverage(x, y) {
            const avg = new Array(CHANNELS).fill(0);
            let samples = 0;

            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) {
                        continue;
                    }

                    const nx = (x + dx + cols) % cols;
                    const ny = (y + dy + rows) % rows;
                    const cell = grid[ny][nx];
                    for (let c = 0; c < CHANNELS; c++) {
                        avg[c] += cell[c];
                    }
                    samples++;
                }
            }

            for (let c = 0; c < CHANNELS; c++) {
                avg[c] /= samples;
            }
            return avg;
        }

        function stepAutomata() {
            const next = createGrid(false);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const current = grid[y][x];
                    const neighborhood = computeNeighborhoodAverage(x, y);
                    const viz = current[0];

                    for (let c = 0; c < CHANNELS; c++) {
                        const selfTerm = rule.self[c] * current[c];
                        const diffusion = rule.neighbor[c] * (neighborhood[c] - current[c]);
                        const fromViz = rule.driveFromViz[c] * (viz - 0.5);
                        const toViz = c === 0 ? neighborhood.slice(1).reduce((sum, val, idx) => sum + val * rule.vizFeedback[idx + 1], 0) : 0;
                        const delta = selfTerm + diffusion + fromViz + toViz + rule.bias[c];
                        next[y][x][c] = clamp01(current[c] + dt * delta);
                    }
                }
            }

            grid = next;
            draw();
        }

        function start() {
            if (running) {
                return;
            }
            running = true;
            toggleBtn.textContent = 'Pause';
            timer = setInterval(stepAutomata, 100);
        }

        function stop() {
            running = false;
            toggleBtn.textContent = 'Start';
            clearInterval(timer);
            timer = null;
        }

        function paintCell(event) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left) / cellSize);
            const y = Math.floor((event.clientY - rect.top) / cellSize);

            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                const active = grid[y][x][0] < 0.5;
                for (let c = 0; c < CHANNELS; c++) {
                    grid[y][x][c] = active ? (c === 0 ? 1 : Math.random()) : 0;
                }
                draw();
            }
        }

        canvas.addEventListener('click', paintCell);

        toggleBtn.addEventListener('click', () => {
            if (running) {
                stop();
            } else {
                start();
            }
        });

        stepBtn.addEventListener('click', () => {
            if (!running) {
                stepAutomata();
            }
        });

        randomBtn.addEventListener('click', () => {
            grid = createGrid(true);
            draw();
        });

        ruleBtn.addEventListener('click', () => {
            randomizeRule();
        });

        clearBtn.addEventListener('click', () => {
            stop();
            grid = createGrid(false);
            rule = createDefaultRule();
            ruleNote.textContent = 'Rule: smooth activator-diffuser (default)';
            draw();
        });

        draw();
    </script>
</body>
</html>
