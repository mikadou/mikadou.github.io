<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My GitHub Pages Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 28px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 680px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
        }
        p {
            color: #555;
        }
        .game {
            margin-top: 20px;
        }
        #gameCanvas {
            border: 1px solid #d1d9e6;
            background: #f8fbff;
            border-radius: 4px;
            cursor: crosshair;
            max-width: 100%;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        button {
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #334155;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover {
            background: #f1f5f9;
        }
        footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Site Under Construction</h1>
        <p>This GitHub Pages site is coming soon.</p>
        <p>Try the mini cellular simulation below while you wait.</p>

        <section class="game" aria-label="Multichannel cellular simulation">
            <canvas id="gameCanvas" width="480" height="320"></canvas>
            <div class="controls">
                <button id="toggleBtn" type="button">Start</button>
                <button id="stepBtn" type="button">Step</button>
                <button id="randomBtn" type="button">Randomize</button>
                <button id="ruleBtn" type="button">Random Rule</button>
                <button id="clearBtn" type="button">Clear</button>
            </div>
            <p id="ruleLabel" aria-live="polite"></p>
        </section>

        <footer>
            Hosted with <a href="https://pages.github.com/">GitHub Pages</a>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const stepBtn = document.getElementById('stepBtn');
        const randomBtn = document.getElementById('randomBtn');
        const ruleBtn = document.getElementById('ruleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const ruleLabel = document.getElementById('ruleLabel');

        const cellSize = 16;
        const cols = Math.floor(canvas.width / cellSize);
        const rows = Math.floor(canvas.height / cellSize);
        const channelsPerCell = 16;
        const neighborhoodRadius = 1;

        let running = false;
        let timer = null;
        let grid = createGrid(false);
        let rule = createRandomRule();

        function createCell(randomize = false) {
            return Array.from(
                { length: channelsPerCell },
                () => (randomize ? Math.random() : 0)
            );
        }

        function createGrid(randomize = false) {
            return Array.from({ length: rows }, () =>
                Array.from({ length: cols }, () => createCell(randomize))
            );
        }

        function createRandomRule() {
            const kernelWidth = neighborhoodRadius * 2 + 1;
            const neighborhoodSize = kernelWidth * kernelWidth;
            const kernel = Array.from({ length: neighborhoodSize }, () =>
                Array.from({ length: channelsPerCell }, () =>
                    Array.from({ length: channelsPerCell }, () => (Math.random() - 0.5) * 0.52)
                )
            );

            const bias = Array.from({ length: channelsPerCell }, () => (Math.random() - 0.5) * 0.3);

            return {
                kernel,
                bias,
                gain: 1 + Math.random() * 1.5,
                damping: 0.85 + Math.random() * 0.13
            };
        }

        function updateRuleLabel() {
            const kernelWidth = neighborhoodRadius * 2 + 1;
            ruleLabel.textContent = `Rule: ${channelsPerCell}ch, ${kernelWidth}x${kernelWidth} neighborhood, gain=${rule.gain.toFixed(2)}, damping=${rule.damping.toFixed(2)}`;
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function activate(value) {
            return 1 / (1 + Math.exp(-value));
        }

        function nextGeneration() {
            const next = createGrid(false);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    for (let outChannel = 0; outChannel < channelsPerCell; outChannel++) {
                        let sum = rule.bias[outChannel] + grid[y][x][outChannel] * rule.damping;
                        let kernelIndex = 0;

                        for (let dy = -neighborhoodRadius; dy <= neighborhoodRadius; dy++) {
                            for (let dx = -neighborhoodRadius; dx <= neighborhoodRadius; dx++) {
                                const nx = (x + dx + cols) % cols;
                                const ny = (y + dy + rows) % rows;
                                const weights = rule.kernel[kernelIndex][outChannel];
                                const neighbor = grid[ny][nx];

                                for (let inChannel = 0; inChannel < channelsPerCell; inChannel++) {
                                    sum += neighbor[inChannel] * weights[inChannel];
                                }

                                kernelIndex++;
                            }
                        }

                        next[y][x][outChannel] = clamp01(activate(sum * rule.gain));
                    }
                }
            }

            grid = next;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const value = grid[y][x][0];
                    const hue = 210 + value * 70;
                    const saturation = 70 + value * 20;
                    const lightness = 10 + value * 75;
                    ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
                }
            }
        }

        function start() {
            if (running) {
                return;
            }
            running = true;
            toggleBtn.textContent = 'Pause';
            timer = setInterval(nextGeneration, 110);
        }

        function stop() {
            running = false;
            toggleBtn.textContent = 'Start';
            clearInterval(timer);
            timer = null;
        }

        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left) / cellSize);
            const y = Math.floor((event.clientY - rect.top) / cellSize);

            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                const energized = grid[y][x][0] > 0.5;
                grid[y][x] = energized ? createCell(false) : createCell(true);
                draw();
            }
        });

        toggleBtn.addEventListener('click', () => {
            if (running) {
                stop();
            } else {
                start();
            }
        });

        stepBtn.addEventListener('click', () => {
            if (!running) {
                nextGeneration();
            }
        });

        randomBtn.addEventListener('click', () => {
            grid = createGrid(true);
            draw();
        });

        clearBtn.addEventListener('click', () => {
            stop();
            grid = createGrid(false);
            draw();
        });

        ruleBtn.addEventListener('click', () => {
            rule = createRandomRule();
            updateRuleLabel();
        });

        updateRuleLabel();
        draw();
    </script>
</body>
</html>
